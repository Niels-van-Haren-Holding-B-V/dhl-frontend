name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Lint, format check, test and build
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm test
          npm run build

      - name: Resolve lowercase image name
        if: github.ref == 'refs/heads/main'
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/dhl-frontend" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency: k3s-deploy # one deploy at a time, shared with dhl-backend
    steps:
      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -f deploy/k8s/frontend.yaml

      - name: Roll deployment to the freshly pushed :latest
        run: |
          kubectl -n dhl-demo rollout restart deploy/dhl-frontend
          kubectl -n dhl-demo rollout status deploy/dhl-frontend --timeout=180s

      - name: Smoke check
        run: |
          curl -sfI https://dhl-courier.vanharen-it.nl | head -1
          curl -sfI https://dhl-locker.vanharen-it.nl | head -1
