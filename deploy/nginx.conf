server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: /machine and every client-side route serve the bundle
    location / {
        try_files $uri /index.html;
    }

    # never cache the runtime config or the HTML shell
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
