apiVersion: apps/v1
kind: Deployment
metadata:
  name: dhl-frontend
  namespace: dhl-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dhl-frontend
  template:
    metadata:
      labels:
        app: dhl-frontend
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: dhl-frontend
          image: ghcr.io/niels-van-haren-holding-b-v/dhl-frontend:latest
          env:
            - name: API_BASE_URL
              value: https://dhl-api.vanharen-it.nl
            - name: AUTH_URL
              value: https://dhl-auth.vanharen-it.nl
            - name: AUTH_REALM
              value: courier
            - name: AUTH_CLIENT_ID
              value: dhl-frontend
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /config.js
              port: 8080
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dhl-frontend
  namespace: dhl-demo
spec:
  selector:
    app: dhl-frontend
  ports:
    - port: 8080
---
# Two ingresses, one bundle: the courier app and the machine page are the same
# image; only the hostname differs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dhl-courier
  namespace: dhl-demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts: [dhl-courier.vanharen-it.nl]
      secretName: dhl-courier-tls
  rules:
    - host: dhl-courier.vanharen-it.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhl-frontend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dhl-locker
  namespace: dhl-demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts: [dhl-locker.vanharen-it.nl]
      secretName: dhl-locker-tls
  rules:
    - host: dhl-locker.vanharen-it.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhl-frontend
                port:
                  number: 8080
